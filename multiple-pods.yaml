apiVersion: v1
kind: Pod
metadata:
  name: triple-web-server
  labels:
    app: multi-web
spec:
  containers:
  # 1. NGINX Container (Default Port 80)
  - name: nginx-container
    image: nginx:alpine
    ports:
    - containerPort: 80

  # 2. Apache HTTPD Container (Changed to Port 8080)
  - name: httpd-container
    image: httpd:alpine
    ports:
    - containerPort: 8080
    command: ["/bin/sh", "-c"]
    args:
      - |
        sed -i 's/Listen 80/Listen 8080/g' /usr/local/apache2/conf/httpd.conf
        httpd-foreground

  # 3. Caddy Container (Changed to Port 8090)
  - name: caddy-container
    image: caddy:alpine
    ports:
    - containerPort: 8090
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile"]
    volumeMounts:
    - name: caddy-config
      mountPath: /etc/caddy

  volumes:
  - name: caddy-config
    configMap:
      name: caddy-config-map
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config-map
data:
  Caddyfile: |
    :8090 {
        respond "Hello from Caddy on port 8090!"
    }
